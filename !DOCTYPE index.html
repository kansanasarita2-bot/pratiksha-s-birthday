<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Rasmalai 🖤</title>

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0d0d0d;
    color: #eaeaea;
    text-align: center;
    overflow-x: hidden;
}

/* 🤍 HEARTS */
#hearts-container {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

/* CONTENT */
.container {
    position: relative;
    z-index: 2;
    padding: 25px;
    max-width: 900px;
    margin: auto;
}

/* COVER */
.cover-img {
    width: 100%;
    height: 60vh;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 20px;
}

/* TEXT */
.main-text {
    font-size: 24px;
    margin-bottom: 10px;
}

.sub-text {
    color: #aaa;
    margin-bottom: 20px;
}

/* TIMER */
#timer {
    font-size: 26px;
    margin-bottom: 20px;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
}

/* LOCK BOX */
.lock-box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #222;
    cursor: pointer;
}

/* PDF */
#pdfSection {
    display: none;
    margin-top: 20px;
}

iframe {
    width: 100%;
    height: 80vh;
    border-radius: 12px;
    border: none;
}

/* HEART ANIMATION */
.heart {
    position: absolute;
    color: rgba(255,255,255,0.6);
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 0; }
    to { transform: translateY(-10vh); opacity: 0; }
}

</style>
</head>

<body>

<!-- 🤍 HEARTS -->
<div id="hearts-container"></div>

<div class="container">

    <!-- COVER -->
    <img src="cover.png" class="cover-img">

    <!-- TEXT -->
    <div class="main-text">wait cutieee until it’s your birthdayyy 💖</div>

    <!-- TIMER -->
    <div id="timer"></div>

    <!-- PHOTOS -->
    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.png">
    </div>

    <!-- LOCKED PDF -->
    <div class="lock-box" onclick="unlockPDF()">
        <h3>🎁 Tap to open your gift</h3>
        <p>It’s waiting for you…</p>
    </div>

    <div id="pdfSection">
        <iframe src="birthday.pdf"></iframe>
    </div>

</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mp3">
</audio>

<script>

// 🎵 MUSIC (tap anywhere)
let music = document.getElementById("music");
music.volume = 0.4;

document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
}, { once: true });


// ⏳ TIMER
let targetDate = new Date("April 1, 2026 00:00:00").getTime();

setInterval(() => {
    let now = new Date().getTime();
    let distance = targetDate - now;

    let h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    let m = Math.floor((distance % (1000*60*60))/(1000*60));
    let s = Math.floor((distance % (1000*60))/1000);

    document.getElementById("timer").innerHTML = h+"h "+m+"m "+s+"s";

    if (distance < 0) {
        document.querySelector(".main-text").innerHTML = "Happy Birthday 💖";
    }
}, 1000);


// 🔑 SECRET U U U
let count = 0;
document.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "u") {
        count++;
        if (count === 3) unlockPDF();
    }
});


// 🎁 UNLOCK PDF
function unlockPDF() {
    document.getElementById("pdfSection").style.display = "block";
}


// 🤍 HEARTS (VISIBLE FROM START)
function createHearts() {
    const container = document.getElementById("hearts-container");

    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = Math.random() > 0.5 ? "♡" : "❣";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random()*10 + 10) + "px";
        heart.style.animationDuration = (Math.random()*5 + 5) + "s";

        container.appendChild(heart);

        setTimeout(() => heart.remove(), 8000);
    }, 300);
}

createHearts();

</script>

</body>
</html>
